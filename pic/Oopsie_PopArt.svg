<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <!-- Halftone Pattern -->
    <pattern id="halftone" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="3" fill="#ff4a00" opacity="0.15"/>
      <circle cx="15" cy="15" r="2" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <!-- Bold Shadow Filter -->
    <filter id="pop-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="25" dy="25" stdDeviation="0" flood-color="#ff4a00" flood-opacity="1"/>
    </filter>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="#050505"/>
  <rect width="1920" height="1080" fill="url(#halftone)"/>

  <!-- Abstract Data Waves -->
  <path d="M -100 800 Q 400 400 960 700 T 2000 600" fill="none" stroke="#333" stroke-width="40" />
  <path d="M -100 850 Q 400 450 960 750 T 2000 650" fill="none" stroke="#ff4a00" stroke-width="20" opacity="0.8"/>
  
  <g transform="translate(1400, 600) rotate(-10)">
     <!-- Bars -->
     <rect x="0" y="100" width="80" height="200" fill="#111" stroke="#f0f0f0" stroke-width="10"/>
     <rect x="120" y="150" width="80" height="150" fill="#f0f0f0" stroke="#ff4a00" stroke-width="10"/>
     <rect x="240" y="-50" width="80" height="350" fill="#ff4a00" stroke="#050505" stroke-width="10" filter="url(#pop-shadow)"/>
  </g>

  <!-- Central 'OOPSIE' Pop Art Explosion -->
  <g transform="translate(850, 480) rotate(-4)">
    <path d="M 0 -220 L 50 -130 L 160 -180 L 120 -80 L 240 -50 L 150 20 L 260 110 L 140 120 L 180 230 L 80 160 L 0 260 L -80 160 L -180 230 L -140 120 L -260 110 L -150 20 L -240 -50 L -120 -80 L -160 -180 L -50 -130 Z" 
          fill="#f0f0f0" stroke="#050505" stroke-width="15" filter="url(#pop-shadow)" transform="scale(2.2)"/>
    
    <text x="-20" y="50" font-family="'Arial Black', 'Impact', sans-serif" font-size="200" font-weight="900" font-style="italic" text-anchor="middle" fill="#050505" letter-spacing="-5">OOPSIE</text>
    <text x="320" y="140" font-family="'Courier New', monospace" font-size="60" font-weight="bold" text-anchor="middle" fill="#ff4a00" filter="url(#neon-glow)">ADULTS</text>
  </g>

  <!-- Floating badges/stickers (Pop Art aesthetic) -->
  <g transform="translate(200, 200) rotate(-15)">
    <rect x="-20" y="-70" width="360" height="100" fill="#ff4a00" stroke="#f0f0f0" stroke-width="8"/>
    <text x="160" y="-2" font-family="'Courier New', monospace" font-size="55" font-weight="bold" fill="#050505" text-anchor="middle">+250% DWELL</text>
  </g>

  <g transform="translate(1300, 250) rotate(10)">
    <ellipse cx="140" cy="-20" rx="200" ry="70" fill="#050505" stroke="#f0f0f0" stroke-width="10"/>
    <text x="140" y="-2" font-family="'Courier New', monospace" font-size="50" font-weight="bold" fill="#ff4a00" text-anchor="middle">+37% TRAFFIC</text>
  </g>

  <!-- Abstract User Eye -->
  <g transform="translate(300, 800) rotate(15)">
    <path d="M 0 0 Q 150 -120 300 0 Q 150 120 0 0 Z" fill="#111" stroke="#f0f0f0" stroke-width="15" filter="url(#pop-shadow)"/>
    <circle cx="150" cy="0" r="60" fill="#ff4a00"/>
    <circle cx="170" cy="-20" r="15" fill="#f0f0f0"/>
  </g>
  
  <!-- decorative '+' symbols -->
  <path d="M 1700 800 L 1700 860 M 1670 830 L 1730 830" stroke="#f0f0f0" stroke-width="8"/>
  <path d="M 1600 750 L 1600 790 M 1580 770 L 1620 770" stroke="#ff4a00" stroke-width="6"/>
  <path d="M 200 500 L 200 560 M 170 530 L 230 530" stroke="#ff4a00" stroke-width="8"/>
</svg>